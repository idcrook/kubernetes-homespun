#   name: https-homepage
# spec:
#   entryPoints:
#     - websecure
#   routes:
#     - kind: Rule
#       match: Host(`homepage.idcrook.dev`)
#       services:
#         - name: homepage-svc
#           port: 3000
#       middlewares:
#         # - name: my-traefik-auth-with-exceptions
#         - name: tinyauth-tinyauth-middleware@kubernetescrd # tinyauth-middleware
#   tls:
#     certResolver: wildcardresolver

---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
    annotations:
        tinyauth.apps.homepage.config.domain: homepage.idcrook.dev
        tinyauth.apps.homepage.path.block: ^\/
        traefik.ingress.kubernetes.io/router.entrypoints: websecure
        traefik.ingress.kubernetes.io/router.middlewares: |
          default-redirect-to-https@kubernetescrd,
          tinyauth-tinyauth-middleware@kubernetescrd
    name: homepage-ingress
spec:
    rules:
        - host: homepage.idcrook.dev
          http:
            paths:
                - pathType: Prefix
                  path: /
                  backend:
                    service:
                        name: homepage-svc
                        port:
                            number: 3000